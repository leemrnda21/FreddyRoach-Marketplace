{% extends 'core/base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-soft">
        <div class="flex flex-wrap items-center justify-between gap-4">
            <div>
                <p class="text-sm font-semibold uppercase tracking-wider text-slate-500">Dashboard</p>
                <h2 class="text-2xl font-semibold text-slate-900">My items</h2>
            </div>
            <a href="{% url 'item:new' %}" class="inline-flex items-center justify-center rounded-full bg-red-600 px-5 py-2.5 text-sm font-semibold text-white shadow-soft transition hover:-translate-y-0.5 hover:bg-red-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-offset-2">Add new item</a>
        </div>

        <div class="mt-6 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
            {% for item in items %}
                <a href="{% url 'item:detail' item.id %}" class="group flex h-full flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white transition hover:-translate-y-1 hover:border-slate-300">
                    <div class="aspect-[4/3] w-full overflow-hidden bg-slate-100">
                        <img src="{{ item.image.url }}" alt="{{ item.name }}" class="h-full w-full object-cover transition duration-300 group-hover:scale-105">
                    </div>

                    <div class="flex flex-1 flex-col gap-3 p-5">
                        <h3 class="text-lg font-semibold text-slate-900">{{ item.name }}</h3>
                        <span class="text-sm font-semibold text-red-700">PHP {{ item.price }}</span>
                    </div>
                </a>
            {% endfor %}
        </div>
    </div>
{% endblock %}
